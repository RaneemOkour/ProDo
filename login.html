<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - ProDo</title>
</head>

<body>
    <div class="login-container">
        <!-- Logo Area Style like Trello -->
        <div class="logo-area">
            <div class="brand-header">
                <img src="logo.png" alt="ProDo Logo" class="main-logo">
                <span class="brand-name">ProDo</span>
            </div>
            <p class="tagline">Organize • Track • Achieve</p>
            <p class="sub-text">Manage your tasks.</p>
        </div>

        <!-- Login Form -->
        <form>
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="example@mail.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
        
            <!-- Remember Me Checkbox -->
            <div class="remember-me-container">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember me</label>
            </div>

            <button type="submit">Login</button>
        </form>

        <!-- Divider Line -->
        <div class="divider">Or continue with</div>

        <!-- Social Login Buttons -->
        <div class="social-login-group">
            <button class="social-btn google-btn">
                <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_24dp.png" alt="Google">
                Google
            </button>
            <button class="social-btn microsoft-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft">
                Microsoft
            </button>
        </div>

        <div class="form-footer">
            <p>Don't have an account? <a href="#">Create a new account</a></p>
        </div>
    </div>
</body>
</html>
